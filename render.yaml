services:
  - type: web
    name: openclaw
    runtime: node
    plan: free
    buildCommand: npm install -g openclaw@latest
    startCommand: NODE_OPTIONS="--max-old-space-size=400" openclaw gateway start --port 10000
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: OPENCLAW_GATEWAY_HOST
        value: "0.0.0.0"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
