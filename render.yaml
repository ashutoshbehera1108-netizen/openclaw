services:
  - type: web
    name: openclaw
    runtime: node
    buildCommand: npm install openclaw@latest
    startCommand: npx openclaw gateway start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /home/user/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /home/user/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    
